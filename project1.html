<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        background-color: #f45353;
    }

    .container{
        width: 430px;
        height:400px;
        background-color: white;
        box-shadow: 5px 5px   5px 8px rgb(254, 255, 248);
        margin: 50px auto;
        padding-top: 20px;
        margin-top: 100px;
        border-radius:18px;
    }
    #welcome{
        color:rgb(12, 4, 61);
        margin-top: 20px;
        padding-top: 10px;
        text-align: center;
        font-family: playwright, indona, sans-serif;
        letter-spacing: 6px;
    }
    #brand{
        color:rgb(229, 91, 91);
        text-align: center;
        font-family: "Fuzzy Bubbles", sans-serif;
        font-weight: 700;
        font-style: normal;
        letter-spacing: 1px;

}

    .fuzzy-bubbles-bold {
  font-family: "Fuzzy Bubbles", sans-serif;
  font-weight: 700;
  font-style: normal;
}

    .login{
        display: inline-block;
        margin-left: 106px;
        margin-top: 20px;
        font: 1em sans-serif;
        padding: 5px;
        color: rgb(12, 4, 61);
        border: 1px solid rgb(5, 4, 4);
        border-radius: 11px;
        background-color: white;
        width: 70px;
        height: 30px;
        font : 1em sans-serif;
        font-family: 'roboto', 'Times New Roman', 'Times', serif;
    
    }
    .register{
        display: inline-block;
        margin-left: 2px;
        margin-top: 20px;
        font: 1em sans-serif;
        padding: 5px;
        color: rgb(12, 4, 61);
        border: 1px solid rgb(5, 4, 4);
        border-radius: 11px;
        background-color: white;
        width: 70px;
        height: 30px;
        font : 1em sans-serif;
        font-family: 'roboto', 'Times New Roman', 'Times', serif;
    }

    #username{
        display:inline-block;
        margin-left: 25px;
        font : 1em sans-serif;
        font-family: 'roboto', 'Times New Roman', 'Times', serif;

    }
    #password{
        display:inline-block;
        margin-left: 25px;
        margin-top: 15px;
        margin-bottom: 10px;
        font : 1em sans-serif;
        font-family: 'roboto', 'Times New Roman', 'Times', serif;
    }
#usernameSection{
   position: relative;
   left: 45px;
   margin-top: 20px;
}
#passwordSection{
    position: relative;
    left: 45px;
     margin-top: 10px;


}
#loginRegister{
    display:inline-block;
    position: relative;
    left: 30px;
    text-align: center;
}
.or{
    display:inline-block;;
    font: 1em sans-serif;
    font-family: 'georgia', 'Times New Roman', 'Times', serif;
    margin-left: 5px;
    margin-right: 5px;
}
#usernameSection input{
    width: 250px;
    height: 30px;
    border-radius: 10px;
    border: 1px solid rgb(5, 4, 4);
    padding-left: 10px;

}
#passwordSection input{
    width: 250px;
    height: 30px;
    border-radius: 10px;
    border: 1px solid rgb(5, 4, 4);
    padding-left: 11px;
    margin-left: 5px;
}
.login:hover, .register:hover{
    background-color: rgb(229, 91, 91);
    color: white;
    cursor: pointer;
}
.log{
    display: inline-block;
    margin-left: 170px;
    margin-top: 20px;
    font: 1em sans-serif;
    padding: 5px;
    color: rgb(12, 4, 61);
    border: 1px solid rgb(5, 4, 4);
    border-radius: 11px;
    background-color: white;
    width: 70px;
    height: 35px;
    font : 1em sans-serif;
    font-family: 'roboto', 'Times New Roman', 'Times', serif;

}
    
log:hover{
    background-color: rgb(229, 91, 91);
    color: white;
    cursor: pointer;
}

</style>
<body>
    <div class="container">
    <section>
        <h1 id="welcome">Welcome To </h1>
        <h1 id="brand">AccessOne</h1>
    </section>
    <section id="loginRegister">
        <button class="login">Sign In</button>
        <h2 class="or">|</h2>
        <button class="register">Sign Up</button>
    </section>
        <section id="usernameSection">
        <h3 id="username">Username: </h3>
        <input type="text" placeholder="Username" defaultValue="Username" >
        </section>
       <section id="passwordSection">
        <h3 id="password">Password: </h3>
        <input type="password" placeholder="Password" defaultValue="Password" >
       </section>
       <section id="loginf">
        <button class="log">Login</button>
        </section>
    </div>
</body>
</html>
